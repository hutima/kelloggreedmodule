<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <!-- Lock page zoom: this is a fixed full-screen PWA with its OWN diagram
         pan/zoom, and native pinch-zoom (especially zoom-OUT) leaves an iOS
         standalone PWA stuck on a blank white page. user-scalable=no covers
         Android / older iOS; the gesture cancel in preventNativeZoom.ts covers
         modern iOS Safari, which ignores user-scalable for pinch. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1f2933" />
    <meta
      name="description"
      content="Scripture Diagrammer — create, edit, and export sentence diagrams (Kellogg-Reed, phrase, dependency, morphology) for English, Koine/Biblical Greek, and Biblical Hebrew."
    />
    <title>Scripture Diagrammer</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9LSM283HY8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-9LSM283HY8');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
